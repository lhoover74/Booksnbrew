<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | Books and Brews</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="site-shell">
    <section class="page-hero">
      <div class="container">
        <div class="section-card" style="max-width:560px;margin:0 auto;">
          <span class="eyebrow">Client Portal</span>
          <h1 class="page-title">Reset Password</h1>
          <p class="page-copy">
            Set a new password for your client portal.
          </p>

          <form id="resetPasswordForm" style="margin-top:22px;">
            <input id="resetEmail" name="email" type="hidden" />
            <input id="resetToken" name="token" type="hidden" />

            <label for="newPassword">New Password</label>
            <input id="newPassword" name="newPassword" type="password" required />

            <label for="confirmPassword" style="margin-top:14px;">Confirm New Password</label>
            <input id="confirmPassword" name="confirmPassword" type="password" required />

            <div style="margin-top:18px;">
              <button type="submit" class="btn primary">Reset Password</button>
            </div>

            <p id="resetPasswordMsg" class="form-response" aria-live="polite"></p>
          </form>
        </div>
      </div>
    </section>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    document.getElementById("resetEmail").value = params.get("email") || "";
    document.getElementById("resetToken").value = params.get("token") || "";

    document.getElementById("resetPasswordForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const msg = document.getElementById("resetPasswordMsg");
      msg.textContent = "";

      try {
        const form = new FormData(event.target);

        const response = await fetch("/api/client/reset-password", {
          method: "POST",
          body: form
        });

        const data = await response.json();

        if (!response.ok || !data.ok) {
          msg.textContent = data.error || "Unable to reset password.";
          return;
        }

        msg.textContent = "Password reset successfully. Redirecting to login...";
        setTimeout(() => {
          window.location.href = "/client/login.html";
        }, 1200);
      } catch (error) {
        msg.textContent = "Unable to reset password right now.";
      }
    });
  </script>
</body>
</html>
