<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Books and Brews</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="site-shell">
    <section class="page-hero">
      <div class="container">
        <div class="section-card" style="max-width:560px;margin:0 auto;">
          <span class="eyebrow">Client Portal</span>
          <h1 class="page-title">Forgot Password</h1>
          <p class="page-copy">
            Enter your portal email and we’ll send you a password reset link.
          </p>

          <form id="forgotPasswordForm" style="margin-top:22px;">
            <label for="resetEmail">Email</label>
            <input id="resetEmail" name="email" type="email" required />

            <div style="margin-top:18px;">
              <button type="submit" class="btn primary">Send Reset Link</button>
            </div>

            <p id="forgotPasswordMsg" class="form-response" aria-live="polite"></p>
          </form>

          <div style="margin-top:18px;">
            <a href="/client/login.html" class="btn secondary">Back to Login</a>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    document.getElementById("forgotPasswordForm").addEventListener("submit", async (event) => {
      event.preventDefault();

      const msg = document.getElementById("forgotPasswordMsg");
      msg.textContent = "";

      try {
        const form = new FormData(event.target);

        const response = await fetch("/api/client/request-reset", {
          method: "POST",
          body: form
        });

        const data = await response.json();
        msg.textContent = data.message || "If that email exists, a reset link has been sent.";
      } catch (error) {
        msg.textContent = "Unable to send reset link right now.";
      }
    });
  </script>
</body>
</html>
