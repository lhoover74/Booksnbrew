<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pipeline | Books and Brews</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>

<body>
  <div class="site-shell">

    <section class="page-hero">
      <div class="container">
        <div class="section-card" style="
          background:
            radial-gradient(circle at top right, rgba(199,144,88,.14), transparent 30%),
            linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
        ">
          <span class="eyebrow">CRM Pipeline</span>
          <h1 class="page-title">Lead Pipeline</h1>
          <p class="page-copy">
            Track every lead through your process. Move them from inquiry to closed deal.
          </p>
        </div>
      </div>
    </section>

    <section class="section compact">
      <div class="container">

        <div id="pipeline" style="
          display:flex;
          gap:18px;
          overflow-x:auto;
          padding-bottom:10px;
        "></div>

      </div>
    </section>

  </div>

<script>
async function loadPipeline(){
  const res = await fetch('/api/leads');
  const data = await res.json();
  const leads = data.leads || [];

  const stages = ["New","Contacted","Qualified","Proposal Sent","Won","Lost"];

  const container = document.getElementById("pipeline");

  container.innerHTML = stages.map(stage => {

    const items = leads.filter(l => (l.status || "New") === stage);

    return `
      <div style="
        min-width:280px;
        background:
          linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
        border:1px solid var(--border);
        border-radius:18px;
        padding:14px;
      ">
        <h3 style="
          margin-bottom:14px;
          color:var(--accent);
          font-size:16px;
        ">${stage}</h3>

        <div style="display:flex;flex-direction:column;gap:12px;">
          ${items.map(lead => `
            <div style="
              background:rgba(0,0,0,.35);
              border:1px solid rgba(255,255,255,.06);
              padding:14px;
              border-radius:14px;
              transition:0.2s;
            "
            onmouseover="this.style.transform='translateY(-2px)'"
            onmouseout="this.style.transform='translateY(0)'"
            >

              <div style="font-weight:600;margin-bottom:6px;">
                ${lead.name}
              </div>

              <div style="font-size:12px;color:var(--muted);margin-bottom:8px;">
                ${lead.email}
              </div>

              <div style="
                font-size:12px;
                color:var(--accent);
                margin-bottom:10px;
              ">
                ${autoTag(lead)}
              </div>

              <div style="
                display:flex;
                gap:6px;
                flex-wrap:wrap;
              ">
                <a href="/admin/manage.html?id=${lead.id}" class="btn primary" style="padding:6px 10px;font-size:12px;">
                  Manage
                </a>

                <a href="/admin/lead.html?id=${lead.id}" class="btn secondary" style="padding:6px 10px;font-size:12px;">
                  View
                </a>
              </div>

            </div>
          `).join("") || `<div style="color:var(--muted);font-size:12px;">No leads</div>`}
        </div>
      </div>
    `;

  }).join("");
}

function autoTag(lead){
  if(lead.budget_range?.includes("5000")) return "🔥 High Value";
  if(lead.project_type) return "📌 " + lead.project_type;
  if(lead.form_type === "quote") return "📄 Quote";
  return "General";
}

loadPipeline();
</script>

</body>
</html>
