<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>
<body>
  <div class="container" style="max-width:400px;margin-top:80px;">
    <h1>Admin Login</h1>
    <form id="loginForm">
      <input type="password" name="password" placeholder="Enter password" required style="width:100%;padding:12px;margin:10px 0;" />
      <button type="submit" style="width:100%;padding:12px;background:#c79058;border:none;color:#000;">Login</button>
    </form>
    <p id="error" style="color:red;"></p>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const form = new FormData(e.target);

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        body: form
      });

      if (res.ok) {
        window.location.href = '/admin/';
      } else {
        document.getElementById('error').textContent = 'Invalid password';
      }
    });
  </script>
</body>
</html>
