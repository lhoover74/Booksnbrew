<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Lead | Books and Brews</title>
  <link rel="stylesheet" href="/assets/css/styles.css" />
</head>

<body style="background:#0b0b0c;color:#f5ede3;font-family:Inter,Arial,sans-serif;">
  <div class="container" style="max-width:1100px;margin:40px auto;">

    <h1 style="margin-bottom:20px;">Manage Lead</h1>

    <div id="error" style="display:none;color:red;"></div>

    <!-- LEAD HEADER -->
    <div style="background:#121111;padding:20px;border-radius:14px;margin-bottom:20px;">
      <h2 id="leadName"></h2>
      <p id="leadEmail"></p>
      <p id="leadTag" style="color:#c79058;font-weight:600;"></p>
    </div>

    <!-- STATUS -->
    <div style="background:#121111;padding:20px;border-radius:14px;margin-bottom:20px;">
      <h3>Status</h3>
      <form id="statusForm">
        <select name="status" id="statusSelect">
          <option>New</option>
          <option>Contacted</option>
          <option>Qualified</option>
          <option>Proposal Sent</option>
          <option>Won</option>
          <option>Lost</option>
        </select>
        <button type="submit">Update</button>
      </form>
      <p id="statusMsg"></p>
    </div>

    <!-- NOTES -->
    <div style="background:#121111;padding:20px;border-radius:14px;margin-bottom:20px;">
      <h3>Notes</h3>

      <form id="noteForm">
        <textarea name="note" placeholder="Add note..." required></textarea>
        <button type="submit">Add Note</button>
      </form>

      <div id="notes" style="margin-top:15px;"></div>
    </div>

    <!-- REMINDERS -->
    <div style="background:#121111;padding:20px;border-radius:14px;margin-bottom:20px;">
      <h3>Reminders</h3>

      <form id="reminderForm">
        <input type="datetime-local" name="remindAt" required />
        <input type="text" name="note" placeholder="Reminder note" />
        <button type="submit">Set Reminder</button>
      </form>

      <div id="reminders" style="margin-top:15px;"></div>
    </div>

    <!-- BOOKINGS -->
    <div style="background:#121111;padding:20px;border-radius:14px;">
      <h3>Schedule Call</h3>

      <form id="bookingForm">
        <input name="name" placeholder="Name" required />
        <input name="email" placeholder="Email" required />
        <input type="datetime-local" name="date" required />
        <input name="notes" placeholder="Optional notes" />
        <button type="submit">Schedule</button>
      </form>

      <p id="bookingMsg"></p>
    </div>

  </div>

<script>
const params = new URLSearchParams(window.location.search);
const leadId = params.get("id");

function escapeHtml(str){
  return String(str || "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;");
}

function autoTag(lead){
  if(lead.budget_range?.includes("5000")) return "🔥 High Value";
  if(lead.project_type) return "📌 " + lead.project_type;
  return "General";
}

async function loadLead(){
  try{
    const res = await fetch(`/api/leads/${leadId}`);
    const data = await res.json();
    const lead = data.lead;

    document.getElementById("leadName").textContent = lead.name;
    document.getElementById("leadEmail").textContent = lead.email;
    document.getElementById("leadTag").textContent = autoTag(lead);

    document.getElementById("statusSelect").value = lead.status || "New";

  }catch(e){
    document.getElementById("error").textContent = "Failed to load lead";
    document.getElementById("error").style.display = "block";
  }
}

async function loadNotes(){
  const res = await fetch(`/api/get-notes?leadId=${leadId}`);
  const data = await res.json();

  document.getElementById("notes").innerHTML =
    (data.notes || []).map(n =>
      `<p>${escapeHtml(n.note)}</p>`
    ).join("") || "No notes";
}

async function loadReminders(){
  const res = await fetch(`/api/reminders-get?leadId=${leadId}`);
  const data = await res.json();

  document.getElementById("reminders").innerHTML =
    (data.reminders || []).map(r =>
      `<p>${new Date(r.remind_at).toLocaleString()} - ${escapeHtml(r.note)}</p>`
    ).join("") || "No reminders";
}

document.getElementById("statusForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const form = new FormData(e.target);
  form.append("id", leadId);

  await fetch("/api/leads/update-status", {method:"POST", body:form});
  document.getElementById("statusMsg").textContent = "Updated";
});

document.getElementById("noteForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const form = new FormData(e.target);
  form.append("leadId", leadId);

  await fetch("/api/notes/add", {method:"POST", body:form});
  e.target.reset();
  loadNotes();
});

document.getElementById("reminderForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const form = new FormData(e.target);
  form.append("leadId", leadId);

  await fetch("/api/reminders-add", {method:"POST", body:form});
  e.target.reset();
  loadReminders();
});

document.getElementById("bookingForm").addEventListener("submit", async e=>{
  e.preventDefault();
  const form = new FormData(e.target);
  form.append("leadId", leadId);

  await fetch("/api/bookings-add", {method:"POST", body:form});
  document.getElementById("bookingMsg").textContent = "Call scheduled";
  e.target.reset();
});

loadLead();
loadNotes();
loadReminders();
</script>

</body>
</html>
